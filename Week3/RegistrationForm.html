<html>
  <body bgcolor="avacado" align="center">
    <h3>Registration Form</h3>
    <form>
      <table align="center">
        <tr>
          <td>Name:</td>
          <td><input type="text" placeholder="name" /></td>
        </tr>
        <tr>
          <td>Gender:</td>
          <td>
            <input type="radio" name="gender" value="male" /> Male<br />
            <input type="radio" name="gender" value="female" /> Female<br />
            <input type="radio" name="gender" value="other" /> other
          </td>
        </tr>
        <tr>
          <td>Languages Known:</td>
          <td>
            <input type="checkbox" />telugu <br />
            <input type="checkbox" />hindi <br />
            <input type="checkbox" />marati<br />
            <input type="checkbox" />malayalam
          </td>
        </tr>
        <tr>
          <td>Email:</td>
          <td><input type="email" placeholder="email" /></td>
        </tr>
        <tr>
          <td>Mobile Number:</td>
          <td><input type="number" placeholder="mobile number" /></td>
        </tr>
        <tr>
          <td>Address:</td>
          <td><textarea placeholder="enter address"></textarea></td>
        </tr>
        <tr>
          <td>Job Location:</td>
          <td>
            <select>
              <option value="hyderabad">Hyderabad</option>
              <option value="bangalore">Bangalore</option>
              <option value="chennai">Chennai</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Upload Resume:</td>
          <td><input type="file" /></td>
        </tr>
        <tr>
          <td align="center">
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />
          </td>
        </tr>
      </table>
    </form>
    <br />
    <p align="center">A.HASINI</p>
    <p align="center">24881A1206</p>
  </body>
</html>
